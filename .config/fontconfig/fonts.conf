<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <alias binding="strong">
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans</family>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK HK</family>
      <family>Noto Sans CJK JP</family>
      <family>Noto Sans CJK KR</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>serif</family>
    <prefer>
      <family>Noto Serif</family>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK HK</family>
      <family>Noto Serif CJK JP</family>
      <family>Noto Serif CJK KR</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>monospace</family>
    <prefer>
      <family>Inconsolata</family>
      <family>Noto Sans Mono CJK SC</family>
      <family>Noto Sans Mono CJK TC</family>
      <family>Noto Sans Mono CJK HK</family>
      <family>Noto Sans Mono CJK JP</family>
      <family>Noto Sans Mono CJK KR</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>emoji</family>
    <prefer>
      <family>Symbols Nerd Font</family>
      <family>Noto Sans Symbols</family>
    </prefer>
  </alias>

  <alias binding="strong">
    <family>symbols</family>
    <prefer>
      <family>Symbols Nerd Font</family>
      <family>Noto Sans Symbols</family>
    </prefer>
  </alias>

  <selectfont><rejectfont><pattern><patelt name="family">
    <string>Noto Znamenny Musical Notation</string>
    <string>Nimbus Sans</string>
  </patelt></pattern></rejectfont></selectfont>

  <match target="pattern">
    <test qual="any" name="family">
      <string>system-ui</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>sans-serif</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="family">
      <string>symbol</string>
    </test>
    <edit name="family" mode="assign" binding="same">
      <string>symbols</string>
    </edit>
  </match>

  <match><edit name="dpi"><double>102.46</double></edit></match>
  <match target="font">
    <edit name="antialias"><bool>true</bool></edit>
    <edit name="hinting"><bool>true</bool></edit>
    <edit name="autohint"><bool>false</bool></edit>
    <!-- 设置微调级别 -->
    <edit name="hintstyle"><const>hintslight</const></edit>
    <!-- 禁用合成粗体 -->
    <edit name="embolden"><bool>false</bool></edit>
    <!-- 设置为 RGB 规范 -->
    <edit name="rgba"><const>rgb</const></edit>
  </match>

<!-- @reference_tag(font) -->
</fontconfig>
